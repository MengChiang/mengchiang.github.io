<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://unpkg.com/material-components-web@latest/dist/material-components-web.min.css" rel="stylesheet">
    <script src="https://unpkg.com/material-components-web@latest/dist/material-components-web.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js" integrity="sha256-/xUj+3OJU5yExlq6GSYGSHk7tPXikynS7ogEvDej/m4=" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
    <link rel="stylesheet" type="text/css" href="style.css">
    <title>Document</title>
</head>

<script>
    function check() {
        let account = $('#account').val().toUpperCase();
        let password = $('#password').val().toUpperCase();
        $.getJSON("data.json", function(data) {
            data.forEach(element => {
                if (element['account'] == account && element['password'] == password) {
                    $('#score').html(element['score']);
                    $('#comment').html(element['comment']);
                    return;
                }
            });
        });
    }
</script>

<body>
    <div class="mdc-card mdc-card--outlined" style="text-align: center;">
        <span class="mdc-line-ripple">互動藝術期中成績查詢</span>
        <br>
        <label class="mdc-text-field mdc-text-field--filled">
            <span class="mdc-text-field__ripple">學號：</span>
            <input class="mdc-text-field__input" aria-labelledby="my-label-id" required minlength="8" id="account">
            <span class="mdc-line-ripple"></span>
        </label>
        <br>
        <label class="mdc-text-field mdc-text-field--filled">
            <span class="mdc-text-field__ripple">密碼：</span>
            <input class="mdc-text-field__input" type="password" aria-labelledby="my-label-id" required minlength="8"
                id="password">
            <span class="mdc-line-ripple"></span>
        </label>
        <br>
        <button class="mdc-button mdc-button--outlined" onclick="check()">
            <span class="mdc-button__ripple"></span>
            <span class="mdc-button__label">Submit</span>
        </button> 分數：
        <div id="score">
        </div>
        評語：
        <div id="comment"></div>
    </div>
</body>

</html>
